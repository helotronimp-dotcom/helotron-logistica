<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helotron — Central de Informações</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

  /* BARRA DE ABAS */
  .tabbar {
    display: flex;
    align-items: stretch;
    background: #1a1a2e;
    border-bottom: 3px solid #0f3460;
    height: 52px;
    position: relative;
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    border-right: 1px solid #30363d;
    min-width: 160px;
  }
  .brand-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #0f3460, #1565c0);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .brand-name {
    font-size: 13px;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: 0.5px;
  }
  .tabs {
    display: flex;
    flex: 1;
    align-items: stretch;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #7d8590;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Segoe UI', Arial, sans-serif;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .tab:hover {
    color: #e6edf3;
    background: rgba(255,255,255,0.04);
  }
  .tab.active {
    color: #58a6ff;
    border-bottom-color: #58a6ff;
    background: rgba(88,166,255,0.06);
  }
  .tab .tab-icon { font-size: 15px; }

  /* CONTEÚDO */
  .content {
    height: calc(100vh - 52px);
    position: relative;
  }
  .pane {
    display: none;
    position: absolute;
    inset: 0;
  }
  .pane.active { display: block; }
  .pane iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<nav class="tabbar">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <span class="brand-name">HELOTRON</span>
  </div>
  <div class="tabs">
    <button class="tab active" id="btn-vendas" onclick="show('vendas')">
      <span class="tab-icon">📊</span> Monitor de Vendas
    </button>
    <button class="tab" id="btn-logistica" onclick="show('logistica')">
      <span class="tab-icon">🚢</span> Logística
    </button>
    <button class="tab" id="btn-invoice" onclick="show('invoice')">
      <span class="tab-icon">🧾</span> Produtos &amp; Invoice
    </button>
    <button class="tab" id="btn-fixos" onclick="show('fixos')">
      <span class="tab-icon">📦</span> Custos Fixos
    </button>
  </div>
</nav>

<div class="content">
  <div class="pane active" id="pane-vendas">
    <iframe src="./precos.html" title="Monitor de Vendas"></iframe>
  </div>
  <div class="pane" id="pane-logistica">
    <iframe src="./logistica.html" title="Monitor de Logística"></iframe>
  </div>
  <div class="pane" id="pane-invoice">
    <iframe src="./dashboard.html" title="Produtos e Invoice"></iframe>
  </div>
  <div class="pane" id="pane-fixos">
    <iframe src="./fixos.html" title="Custos Fixos Operacionais"></iframe>
  </div>
</div>

<script>
  function show(id) {
    ['vendas', 'logistica', 'invoice', 'fixos'].forEach(t => {
      document.getElementById('btn-' + t).classList.toggle('active', t === id);
      document.getElementById('pane-' + t).classList.toggle('active', t === id);
    });
  }
</script>
</body>
</html>
